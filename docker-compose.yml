services:
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
